<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Community Portal</title>
</head>
<body>

    <h1>Community Portal</h1>

    <!-- Exercise 3 -->
    <h2>Upcoming Events</h2>
    <div id="eventOutput"></div>

    <!-- Exercise 7 -->
    <h2>DOM Manipulation</h2>
    <div id="eventContainer"></div>

    <!-- Exercise 8 -->
    <h2>Search Events</h2>

    <input
        type="text"
        id="eventSearchInput"
        placeholder="Search Event"
    >

    <select id="eventCategorySelect">
        <option value="all">All</option>
        <option value="music">Music</option>
        <option value="dance">Dance</option>
        <option value="workshop">Workshop</option>
    </select>

    <div id="listBox"></div>

    <!-- Exercise 9 -->
    <h2>Fetch Events</h2>

    <button onclick="loadEvents()">
        Fetch (.then)
    </button>

    <button onclick="loadAsync()">
        Fetch (async/await)
    </button>

    <p id="spinner" style="display:none;">
        Loading...
    </p>

    <div id="communityOutput"></div>

    <!-- Exercise 11 -->
    <h2>User Registration</h2>

    <form id="userForm">

        <input
            type="text"
            name="userName"
            placeholder="Name"
        ><br><br>

        <input
            type="email"
            name="userEmail"
            placeholder="Email"
        ><br><br>

        <button type="submit">
            Submit
        </button>

    </form>

    <p id="statusMsg"></p>

    <!-- Exercise 14 -->
    <h2>jQuery Demo</h2>

    <button id="registerBtn">
        Register
    </button>

    <button id="showBtn">
        Show Events
    </button>

    <button id="hideBtn">
        Hide Events
    </button>

    <div
        id="eventCard"
        style="display:none;"
    >
        <h3>Music Fest</h3>
        <p>Dance Show</p>
    </div>

    <p id="statusText"></p>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="final.js"></script>

</body>
</html>
